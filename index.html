<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        input[type=range] { height: 4px; border-radius: 2px; }
    </style>
</head>
<body class="text-slate-100 font-sans">
    <div id="root" class="fixed inset-0 flex flex-col p-3 md:p-6 gap-4"></div>

    <script type="text/babel">
        const { useReducer, useRef, useEffect, useCallback } = React;

        const Icon = ({ name, size = 18 }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }}></i>;
        };

        const initialState = {
            videoSrc: null, processedVideoSrc: null, selections: [],
            isProcessing: false, progress: 0, isPlaying: false,
            blurValue: 50, padding: 10, status: 'Pronto', mimeType: 'video/webm'
        };

        function reducer(state, action) {
            switch (action.type) {
                case 'LOAD': return { ...state, videoSrc: action.payload, selections: [], processedVideoSrc: null, status: 'Vídeo Carregado' };
                case 'STATUS': return { ...state, status: action.payload };
                case 'SET_PROC': return { ...state, isProcessing: action.payload };
                case 'SET_PROG': return { ...state, progress: action.payload };
                case 'SET_PLAY': return { ...state, isPlaying: action.payload };
                case 'SET_SEL': return { ...state, selections: action.payload };
                case 'SET_BLUR': return { ...state, blurValue: action.payload };
                case 'DONE': return { ...state, processedVideoSrc: action.payload, isProcessing: false, status: 'Concluído' };
                default: return state;
            }
        }

        function App() {
            const [state, dispatch] = useReducer(reducer, initialState);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const selectionStart = useRef(null);

            const syncCanvas = () => {
                if (videoRef.current && canvasRef.current) {
                    canvasRef.current.width = videoRef.current.clientWidth;
                    canvasRef.current.height = videoRef.current.clientHeight;
                    draw();
                }
            };

            const draw = () => {
                const ctx = canvasRef.current?.getContext('2d');
                if (!ctx) return;
                ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                state.selections.forEach(sel => {
                    ctx.strokeStyle = '#6366f1';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sel.x, sel.y, sel.w, sel.h);
                    ctx.fillStyle = 'rgba(99, 102, 241, 0.2)';
                    ctx.fillRect(sel.x, sel.y, sel.w, sel.h);
                });
            };

            useEffect(() => { draw(); }, [state.selections]);

            const detectIA = async () => {
                if (!videoRef.current) return;
                dispatch({ type: 'SET_PROC', payload: true });
                dispatch({ type: 'STATUS', payload: 'IA analisando...' });

                try {
                    const temp = document.createElement('canvas');
                    temp.width = videoRef.current.videoWidth;
                    temp.height = videoRef.current.videoHeight;
                    temp.getContext('2d').drawImage(videoRef.current, 0, 0);
                    const base64 = temp.toDataURL('image/png').split(',')[1];
                    
                    const apiKey = ""; // <--- INSIRA SUA CHAVE AQUI
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Detect watermarks or logos. Return JSON only: {'marks': [{x, y, w, h}]} in 0-100 scale." }, { inlineData: { mimeType: "image/png", data: base64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    const data = await res.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    
                    if (result.marks) {
                        const mapped = result.marks.map(m => ({
                            x: (m.x / 100) * canvasRef.current.width,
                            y: (m.y / 100) * canvasRef.current.height,
                            w: (m.w / 100) * canvasRef.current.width,
                            h: (m.h / 100) * canvasRef.current.height
                        }));
                        dispatch({ type: 'SET_SEL', payload: mapped });
                    }
                    dispatch({ type: 'STATUS', payload: 'IA Concluída' });
                } catch (e) {
                    dispatch({ type: 'STATUS', payload: 'Erro na API. Use o Manual.' });
                }
                dispatch({ type: 'SET_PROC', payload: false });
            };

            const startRemoval = async () => {
                dispatch({ type: 'SET_PROC', payload: true });
                const video = videoRef.current;
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const stream = canvas.captureStream(30);
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
                    dispatch({ type: 'DONE', payload: url });
                };

                recorder.start();
                video.currentTime = 0;
                video.play();

                const renderFrame = () => {
                    if (video.paused || video.ended) { recorder.stop(); return; }
                    ctx.drawImage(video, 0, 0);
                    state.selections.forEach(sel => {
                        const sX = video.videoWidth / canvasRef.current.width;
                        const sY = video.videoHeight / canvasRef.current.height;
                        ctx.filter = `blur(${state.blurValue}px)`;
                        ctx.drawImage(video, sel.x*sX, sel.y*sY, sel.w*sX, sel.h*sY, sel.x*sX, sel.y*sY, sel.w*sX, sel.h*sY);
                        ctx.filter = 'none';
                    });
                    dispatch({ type: 'SET_PROG', payload: (video.currentTime / video.duration) * 100 });
                    requestAnimationFrame(renderFrame);
                };
                renderFrame();
            };

            return (
                <>
                    <header className="flex justify-between items-center bg-slate-900/80 p-3 rounded-2xl border border-slate-800 shrink-0">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg"><Icon name="shield-check" /></div>
                            <span className="font-black uppercase tracking-tighter text-sm">Editor <span className="text-indigo-500">Pro</span></span>
                        </div>
                        {state.isProcessing && <span className="text-[10px] font-mono bg-slate-950 px-3 py-1 rounded-full border border-indigo-500/30">{Math.round(state.progress)}%</span>}
                    </header>

                    {!state.videoSrc ? (
                        <label className="flex-1 border-2 border-dashed border-slate-800 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-500/5 transition-all">
                            <input type="file" className="hidden" onChange={e => dispatch({ type: 'LOAD', payload: URL.createObjectURL(e.target.files[0]) })} accept="video/*" />
                            <Icon name="upload-cloud" size={32} />
                            <span className="mt-2 text-xs font-bold uppercase tracking-widest text-slate-500">Carregar Vídeo</span>
                        </label>
                    ) : (
                        <div className="flex-1 flex flex-col md:flex-row gap-4 min-h-0">
                            <div className="flex-[3] flex flex-col gap-2 min-h-0">
                                <div className="relative flex-1 bg-black rounded-3xl overflow-hidden border border-slate-800 flex items-center justify-center">
                                    {!state.processedVideoSrc ? (
                                        <>
                                            <video ref={videoRef} src={state.videoSrc} className="w-full h-full object-contain" muted onLoadedData={syncCanvas} />
                                            <canvas ref={canvasRef} className="absolute top-0 left-0 w-full h-full z-20 cursor-crosshair" 
                                                onMouseDown={e => {
                                                    const r = canvasRef.current.getBoundingClientRect();
                                                    selectionStart.current = { x: e.clientX - r.left, y: e.clientY - r.top };
                                                }}
                                                onMouseUp={e => {
                                                    const r = canvasRef.current.getBoundingClientRect();
                                                    const curX = e.clientX - r.left, curY = e.clientY - r.top;
                                                    const n = { x: Math.min(selectionStart.current.x, curX), y: Math.min(selectionStart.current.y, curY), w: Math.abs(curX - selectionStart.current.x), h: Math.abs(curY - selectionStart.current.y) };
                                                    if (n.w > 5) dispatch({ type: 'SET_SEL', payload: [...state.selections, n] });
                                                    selectionStart.current = null;
                                                }}
                                            />
                                        </>
                                    ) : <video src={state.processedVideoSrc} controls className="w-full h-full object-contain" autoPlay /> }
                                </div>
                                <div className="bg-slate-900/50 p-2 rounded-xl flex justify-between items-center px-4 shrink-0">
                                    <button onClick={() => videoRef.current.paused ? videoRef.current.play() : videoRef.current.pause()}><Icon name={state.isPlaying ? "pause" : "play"} /></button>
                                    <span className="text-[9px] uppercase font-bold text-slate-500 tracking-tighter">{state.status}</span>
                                    <button onClick={() => window.location.reload()}><Icon name="refresh-ccw" className="text-slate-500" /></button>
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col gap-3 min-w-[240px] shrink-0 overflow-y-auto custom-scrollbar">
                                <div className="bg-slate-900/80 p-4 rounded-3xl border border-slate-800 space-y-4">
                                    <button onClick={detectIA} disabled={state.isProcessing} className="w-full bg-white text-black py-2.5 rounded-xl font-black uppercase text-[10px] hover:bg-indigo-50 transition-all flex items-center justify-center gap-2">
                                        <Icon name="sparkles" size={14} /> Detectar Logos IA
                                    </button>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-[9px] font-bold text-slate-500 uppercase"><span>Intensidade Blur</span><span>{state.blurValue}px</span></div>
                                        <input type="range" min="10" max="150" value={state.blurValue} onChange={e => dispatch({ type: 'SET_BLUR', payload: e.target.value })} className="w-full accent-indigo-500" />
                                    </div>
                                    {!state.processedVideoSrc ? (
                                        <button onClick={startRemoval} disabled={state.isProcessing || state.selections.length === 0} className="w-full bg-indigo-600 py-3 rounded-xl font-black uppercase text-[11px] shadow-lg shadow-indigo-900/20 active:scale-95 transition-all">Gerar Vídeo</button>
                                    ) : (
                                        <a href={state.processedVideoSrc} download="video_limpo.webm" className="w-full bg-green-600 py-3 rounded-xl font-black uppercase text-[11px] text-center block">Baixar Vídeo</a>
                                    )}
                                </div>
                                <div className="bg-indigo-500/5 border border-indigo-500/10 p-4 rounded-3xl">
                                    <p className="text-[10px] text-slate-500 italic leading-tight">Arraste o mouse sobre o vídeo para selecionar áreas manualmente se a IA falhar.</p>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
