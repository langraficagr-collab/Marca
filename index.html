<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        input[type=range] { cursor: pointer; }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useReducer, useRef, useEffect, useCallback } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const initialState = {
            videoSrc: null, processedVideoSrc: null, selections: [],
            isProcessing: false, progress: 0, isPlaying: false,
            blurValue: 50, padding: 10, status: 'Sistema Pronto',
            error: null, mimeType: 'video/webm'
        };

        function reducer(state, action) {
            switch (action.type) {
                case 'LOAD_VIDEO': return { ...state, videoSrc: action.payload, selections: [], processedVideoSrc: null, status: 'Vídeo Importado', progress: 0, error: null };
                case 'SET_STATUS': return { ...state, status: action.payload };
                case 'SET_PROCESSING': return { ...state, isProcessing: action.payload };
                case 'SET_PROGRESS': return { ...state, progress: action.payload };
                case 'SET_PLAYING': return { ...state, isPlaying: action.payload };
                case 'SET_SELECTIONS': return { ...state, selections: action.payload };
                case 'REMOVE_SELECTION': return { ...state, selections: state.selections.filter((_, i) => i !== action.payload) };
                case 'SET_PROCESSED': return { ...state, processedVideoSrc: action.payload };
                case 'SET_BLUR': return { ...state, blurValue: parseInt(action.payload) };
                case 'SET_PADDING': return { ...state, padding: parseInt(action.payload) };
                case 'SET_MIME': return { ...state, mimeType: action.payload };
                case 'SET_ERROR': return { ...state, error: action.payload, isProcessing: false };
                default: return state;
            }
        }

        function App() {
            const [state, dispatch] = useReducer(reducer, initialState);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const selectionStart = useRef(null);

            const syncCanvas = useCallback(() => {
                if (videoRef.current && canvasRef.current) {
                    canvasRef.current.width = videoRef.current.offsetWidth;
                    canvasRef.current.height = videoRef.current.offsetHeight;
                    drawOverlay();
                }
            }, [state.selections]);

            useEffect(() => {
                window.addEventListener('resize', syncCanvas);
                return () => window.removeEventListener('resize', syncCanvas);
            }, [syncCanvas]);

            const drawOverlay = () => {
                const ctx = canvasRef.current?.getContext('2d');
                if (!ctx) return;
                ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                state.selections.forEach((sel, i) => {
                    ctx.strokeStyle = '#6366f1';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sel.x, sel.y, sel.w, sel.h);
                    ctx.fillStyle = 'rgba(99, 102, 241, 0.2)';
                    ctx.fillRect(sel.x, sel.y, sel.w, sel.h);
                });
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) dispatch({ type: 'LOAD_VIDEO', payload: URL.createObjectURL(file) });
            };

            const detectIA = async () => {
                if (!videoRef.current) return;
                dispatch({ type: 'SET_PROCESSING', payload: true });
                dispatch({ type: 'SET_STATUS', payload: 'IA analisando frame...' });

                try {
                    const temp = document.createElement('canvas');
                    temp.width = videoRef.current.videoWidth;
                    temp.height = videoRef.current.videoHeight;
                    temp.getContext('2d').drawImage(videoRef.current, 0, 0);
                    const base64 = temp.toDataURL('image/png').split(',')[1];
                    
                    const apiKey = ""; // <--- COLOQUE SUA API KEY AQUI
                    const payload = {
                        contents: [{ parts: [{ text: "Identify bounding boxes of watermarks. Return JSON: {'marks': [{x, y, w, h}]} (0-100 percentages)." }, { inlineData: { mimeType: "image/png", data: base64 } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    };

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    
                    if (result.marks) {
                        const p = state.padding;
                        const mapped = result.marks.map(m => ({
                            x: (m.x / 100) * canvasRef.current.width - p/2,
                            y: (m.y / 100) * canvasRef.current.height - p/2,
                            w: (m.w / 100) * canvasRef.current.width + p,
                            h: (m.h / 100) * canvasRef.current.height + p
                        }));
                        dispatch({ type: 'SET_SELECTIONS', payload: mapped });
                    }
                    dispatch({ type: 'SET_STATUS', payload: 'Deteção Concluída' });
                } catch (e) {
                    dispatch({ type: 'SET_STATUS', payload: 'Erro na IA. Use o manual.' });
                }
                dispatch({ type: 'SET_PROCESSING', payload: false });
            };

            const startRemoval = async () => {
                dispatch({ type: 'SET_PROCESSING', payload: true });
                const video = videoRef.current;
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const stream = canvas.captureStream(30);
                const recorder = new MediaRecorder(stream, { mimeType: state.mimeType });
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    dispatch({ type: 'SET_PROCESSED', payload: URL.createObjectURL(new Blob(chunks, { type: state.mimeType })) });
                    dispatch({ type: 'SET_PROCESSING', payload: false });
                    dispatch({ type: 'SET_STATUS', payload: 'Finalizado' });
                };

                recorder.start();
                video.currentTime = 0;
                video.play();

                const renderFrame = () => {
                    if (video.paused || video.ended) { recorder.stop(); return; }
                    ctx.drawImage(video, 0, 0);
                    state.selections.forEach(sel => {
                        const sX = video.videoWidth / canvasRef.current.width;
                        const sY = video.videoHeight / canvasRef.current.height;
                        ctx.filter = `blur(${state.blurValue}px)`;
                        ctx.drawImage(video, sel.x*sX, sel.y*sY, sel.w*sX, sel.h*sY, sel.x*sX, sel.y*sY, sel.w*sX, sel.h*sY);
                        ctx.filter = 'none';
                    });
                    dispatch({ type: 'SET_PROGRESS', payload: (video.currentTime / video.duration) * 100 });
                    requestAnimationFrame(renderFrame);
                };
                renderFrame();
            };

            return (
                <div className="flex flex-col h-screen max-h-screen p-4 gap-4 overflow-hidden">
                    <header className="flex justify-between items-center bg-slate-900/60 p-4 rounded-3xl border border-slate-800 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl"><Icon name="shield-check" /></div>
                            <h1 className="text-lg font-black italic uppercase">Ultimate <span className="text-indigo-500">Editor</span></h1>
                        </div>
                        {state.isProcessing && (
                            <div className="bg-slate-950 px-4 py-1.5 rounded-xl border border-indigo-500/30 text-xs font-mono">
                                {Math.round(state.progress)}%
                            </div>
                        )}
                    </header>

                    {!state.videoSrc ? (
                        <label className="flex-1 border-2 border-dashed border-slate-800 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-500/5 transition-all">
                            <input type="file" className="hidden" onChange={handleFile} accept="video/*" />
                            <Icon name="refresh-cw" size={40} className="text-indigo-500 mb-4" />
                            <span className="font-black uppercase tracking-widest">Importar Vídeo</span>
                        </label>
                    ) : (
                        <div className="flex flex-1 gap-4 min-h-0">
                            <div className="flex-[3] flex flex-col gap-3 min-h-0">
                                <div className="relative flex-1 bg-black rounded-[2rem] overflow-hidden border border-slate-800 flex items-center justify-center">
                                    {!state.processedVideoSrc ? (
                                        <>
                                            <video ref={videoRef} src={state.videoSrc} className="w-full h-full object-contain" muted onLoadedData={syncCanvas} />
                                            <canvas ref={canvasRef} className="absolute top-0 left-0 w-full h-full z-20 cursor-crosshair" 
                                                onMouseDown={(e) => {
                                                    const r = canvasRef.current.getBoundingClientRect();
                                                    selectionStart.current = { x: e.clientX - r.left, y: e.clientY - r.top };
                                                }}
                                                onMouseUp={(e) => {
                                                    const r = canvasRef.current.getBoundingClientRect();
                                                    const curX = e.clientX - r.left, curY = e.clientY - r.top;
                                                    const n = { x: Math.min(selectionStart.current.x, curX), y: Math.min(selectionStart.current.y, curY), w: Math.abs(curX - selectionStart.current.x), h: Math.abs(curY - selectionStart.current.y) };
                                                    if (n.w > 10) dispatch({ type: 'SET_SELECTIONS', payload: [...state.selections, n] });
                                                    selectionStart.current = null; drawOverlay();
                                                }}
                                            />
                                        </>
                                    ) : (
                                        <video src={state.processedVideoSrc} controls className="w-full h-full object-contain" autoPlay />
                                    )}
                                </div>
                                <div className="bg-slate-900/40 p-3 rounded-2xl border border-slate-800 flex justify-between items-center shrink-0">
                                    <button onClick={() => videoRef.current.paused ? videoRef.current.play() : videoRef.current.pause()}><Icon name={state.isPlaying ? "pause" : "play"} /></button>
                                    <span className="text-[10px] uppercase font-bold text-slate-500">{state.status}</span>
                                    <button onClick={() => window.location.reload()}><Icon name="trash-2" className="text-red-500/50" /></button>
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col gap-4 min-w-[280px] overflow-y-auto custom-scrollbar">
                                <div className="bg-slate-900/60 p-5 rounded-[2rem] border border-slate-800 space-y-5">
                                    <button onClick={detectIA} disabled={state.isProcessing} className="w-full bg-white text-black py-3 rounded-xl font-black uppercase text-[10px] flex items-center justify-center gap-2 hover:bg-slate-200 transition-all">
                                        <Icon name="wand-2" size={14}/> Detetar Logos IA
                                    </button>
                                    
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-500 uppercase">
                                            <span>Blur</span>
                                            <span className="text-indigo-400">{state.blurValue}px</span>
                                        </div>
                                        <input type="range" min="10" max="150" value={state.blurValue} onChange={e => dispatch({ type: 'SET_BLUR', payload: e.target.value })} className="w-full accent-indigo-500" />
                                    </div>

                                    {!state.processedVideoSrc ? (
                                        <button onClick={startRemoval} disabled={state.isProcessing || state.selections.length === 0} className="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase text-xs shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
                                            Gerar Vídeo
                                        </button>
                                    ) : (
                                        <a href={state.processedVideoSrc} download="limpo.webm" className="w-full bg-green-600 py-4 rounded-2xl font-black uppercase text-xs text-center block">Baixar Vídeo</a>
                                    )}
                                </div>

                                <div className="bg-indigo-500/5 border border-indigo-500/10 p-5 rounded-[2rem] space-y-3 shrink-0">
                                    <p className="text-[10px] font-black text-indigo-400 uppercase flex items-center gap-2">
                                        <Icon name="mouse-pointer-2" size={12} /> Dica de Uso
                                    </p>
                                    <p className="text-[11px] text-slate-500 leading-relaxed italic">
                                        Clique e arraste no vídeo para marcar manualmente áreas de texto ou logos.
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
