<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor Pro Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; }
        .video-box { background: #000; position: relative; flex: 1; min-height: 0; border-radius: 1.5rem; overflow: hidden; border: 1px solid #1e293b; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; touch-action: none; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="p-4 gap-4">

    <header class="flex justify-between items-center bg-slate-900 p-4 rounded-2xl border border-slate-800 shrink-0">
        <h1 class="font-black text-sm uppercase tracking-tighter">Editor <span class="text-indigo-500">Manual</span></h1>
        <div id="status" class="text-[10px] font-mono text-indigo-400 font-bold">Aguardando arquivo...</div>
    </header>

    <div id="upload-area" class="flex-1 border-2 border-dashed border-slate-800 rounded-[2rem] flex flex-col items-center justify-center cursor-pointer hover:bg-slate-900/50 transition-all">
        <input type="file" id="file-input" class="hidden" accept="video/*" />
        <div class="p-5 bg-slate-800 rounded-full mb-4 text-indigo-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        </div>
        <span class="text-xs font-black uppercase tracking-widest text-slate-500">Abrir Vídeo</span>
    </div>

    <div id="editor-container" class="hidden flex-1 flex flex-col md:flex-row gap-4 min-h-0">
        <div class="video-box flex-[3]">
            <video id="main-video" muted playsinline preload="auto"></video>
            <canvas id="selection-canvas"></canvas>
        </div>

        <div class="flex-1 bg-slate-900/80 p-5 rounded-[2rem] border border-slate-800 space-y-6 shrink-0 md:max-w-[300px]">
            <div class="space-y-3">
                <div class="flex justify-between text-[10px] font-black uppercase text-slate-500">
                    <span>Desfoque</span>
                    <span id="blur-val" class="text-indigo-400">50px</span>
                </div>
                <input type="range" id="blur-range" min="10" max="150" value="50" class="w-full accent-indigo-500" />
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button id="btn-clear" class="bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-slate-700 transition-colors">Limpar</button>
                <button id="btn-reset" onclick="location.reload()" class="bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-slate-700">Novo</button>
            </div>

            <button id="btn-process" class="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase text-xs shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
                Gerar Vídeo
            </button>

            <div id="download-area" class="hidden animate-bounce">
                <a id="download-link" class="w-full bg-green-600 py-4 rounded-2xl font-black uppercase text-xs text-center block shadow-lg shadow-green-500/20">
                    Baixar Agora
                </a>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const canvas = document.getElementById('selection-canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const btnProcess = document.getElementById('btn-process');
        const blurRange = document.getElementById('blur-range');
        const blurValText = document.getElementById('blur-val');

        let selections = [];
        let isDrawing = false;
        let startX, startY;

        // 1. Detectar Formato Suportado (Crucial para Celular)
        const getMimeType = () => {
            const types = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm'];
            for (let t of types) {
                if (MediaRecorder.isTypeSupported(t)) return t;
            }
            return '';
        };

        // 2. Upload e Inicialização
        document.getElementById('upload-area').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                document.getElementById('upload-area').classList.add('hidden');
                document.getElementById('editor-container').classList.remove('hidden');
                status.innerText = "Vídeo Carregado";
            }
        };

        const resize = () => {
            canvas.width = video.clientWidth;
            canvas.height = video.clientHeight;
            draw();
        };
        video.onloadeddata = resize;
        window.onresize = resize;
        blurRange.oninput = () => { blurValText.innerText = `${blurRange.value}px`; draw(); };

        // 3. Lógica de Toque/Mouse Unificada
        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const start = (e) => { isDrawing = true; const p = getPos(e); startX = p.x; startY = p.y; };
        const move = (e) => {
            if (!isDrawing) return;
            const p = getPos(e);
            draw();
            ctx.strokeStyle = '#6366f1';
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
        };
        const end = (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            const p = getPos(e.changedTouches ? e.changedTouches[0] : e);
            const s = { x: Math.min(startX, p.x), y: Math.min(startY, p.y), w: Math.abs(p.x - startX), h: Math.abs(p.y - startY) };
            if (s.w > 10) selections.push(s);
            draw();
        };

        canvas.onmousedown = start; canvas.onmousemove = move; canvas.onmouseup = end;
        canvas.ontouchstart = (e) => { e.preventDefault(); start(e); };
        canvas.ontouchmove = (e) => { e.preventDefault(); move(e); };
        canvas.ontouchend = (e) => { e.preventDefault(); end(e); };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.setLineDash([]);
            selections.forEach(s => {
                ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 2;
                ctx.strokeRect(s.x, s.y, s.w, s.h);
                ctx.fillStyle = 'rgba(99, 102, 241, 0.3)';
                ctx.fillRect(s.x, s.y, s.w, s.h);
            });
        }

        document.getElementById('btn-clear').onclick = () => { selections = []; draw(); };

        // 4. Processamento Robusto
        btnProcess.onclick = async () => {
            if (!selections.length) return;
            
            btnProcess.disabled = true;
            status.innerText = "Preparando...";
            
            const mimeType = getMimeType();
            const outCanvas = document.createElement('canvas');
            const outCtx = outCanvas.getContext('2d', { alpha: false });
            outCanvas.width = video.videoWidth;
            outCanvas.height = video.videoHeight;

            const stream = outCanvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: mimeType });
                document.getElementById('download-area').classList.remove('hidden');
                document.getElementById('download-link').href = URL.createObjectURL(blob);
                document.getElementById('download-link').download = `video_limpo.${mimeType.includes('mp4') ? 'mp4' : 'webm'}`;
                status.innerText = "Vídeo Pronto!";
                btnProcess.disabled = false;
            };

            // Inicia o processo
            video.currentTime = 0;
            recorder.start();
            await video.play();

            const render = () => {
                if (video.paused || video.ended) { recorder.stop(); return; }
                
                outCtx.drawImage(video, 0, 0);
                const sX = video.videoWidth / canvas.width;
                const sY = video.videoHeight / canvas.height;
                
                outCtx.filter = `blur(${blurRange.value}px)`;
                selections.forEach(s => {
                    outCtx.drawImage(video, s.x*sX, s.y*sY, s.w*sX, s.h*sY, s.x*sX, s.y*sY, s.w*sX, s.h*sY);
                });
                outCtx.filter = 'none';

                status.innerText = `Limpando: ${Math.round((video.currentTime / video.duration) * 100)}%`;
                requestAnimationFrame(render);
            };
            render();
        };
    </script>
</body>
</html>
